name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test suite
        run: go test ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
          - goos: windows
            goarch: arm64
            archive: zip

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        id: package
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          ARTIFACT_BASENAME="favicon-fisher_${TAG}_${GOOS}_${GOARCH}"
          BINARY_NAME="favicon-fisher"
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi

          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/${BINARY_NAME}" ./cmd/favicon-fisher

          PACKAGE_ROOT="${RUNNER_TEMP}/${ARTIFACT_BASENAME}"
          rm -rf "${PACKAGE_ROOT}"
          mkdir -p "${PACKAGE_ROOT}"
          cp "dist/${BINARY_NAME}" "${PACKAGE_ROOT}/"
          cp README.md LICENSE "${PACKAGE_ROOT}/"

          if [ "$ARCHIVE" = "zip" ]; then
            (cd "${RUNNER_TEMP}" && zip -rq "${GITHUB_WORKSPACE}/dist/${ARTIFACT_BASENAME}.zip" "${ARTIFACT_BASENAME}")
            echo "asset=dist/${ARTIFACT_BASENAME}.zip" >> "$GITHUB_OUTPUT"
          else
            tar -C "${RUNNER_TEMP}" -czf "dist/${ARTIFACT_BASENAME}.tar.gz" "${ARTIFACT_BASENAME}"
            echo "asset=dist/${ARTIFACT_BASENAME}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
